<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GC ELS</title>
<style>
:root {
    --base:      #d8d8d8;
    --active:    #3691fe;
    --active-bg: rgba(54,145,254,0.14);
    --warn:      #ffaa00;
    --warn-bg:   rgba(255,170,0,0.12);
    --btn-bg:    #424242;
    --br:        4px;
    --font:      "Courier New", Courier, monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;overflow:hidden;width:100vw;height:100vh;font-family:var(--font);user-select:none}
#panel{display:none;position:absolute;bottom:5%;right:5%;background:rgba(0,0,0,0.92);border:1px solid #353535;border-radius:6px;padding:10px;width:24vw;min-width:260px;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.85);pointer-events:none}
#panel.interact{pointer-events:auto}
.hdr{display:flex;align-items:center;gap:7px;padding-bottom:8px;margin-bottom:8px;border-bottom:1px solid #282828}
.hdr-dot{width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0;transition:background 0.3s,box-shadow 0.3s}
.hdr-dot.on{background:var(--active);box-shadow:0 0 6px var(--active)}
.hdr-title{flex:1;font-size:10px;font-weight:bold;letter-spacing:3px;color:#ccc;text-transform:uppercase}
.hdr-badge{font-size:8px;letter-spacing:1px;color:#666}
.hdr-esc{font-size:8px;color:#888;border:1px solid #555;padding:2px 5px;border-radius:2px;cursor:pointer;display:none}
.interact .hdr-esc{display:block}
.btn-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:5px}
.btn{height:56px;background:var(--btn-bg);border:2px solid var(--base);border-radius:var(--br);color:var(--base);font-family:var(--font);font-size:7.5px;font-weight:bold;letter-spacing:0.5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-transform:uppercase;transition:border-color 0.12s,color 0.12s,background 0.12s}
.btn:hover{background:#525252}
.btn.active{border-color:var(--active);color:var(--active);background:var(--active-bg)}
.btn.off-sel{border-color:#888;color:#bbb;background:#3c3c3c}
.btn.warn-on{border-color:var(--warn);color:var(--warn);background:var(--warn-bg);animation:warnblink 0.5s ease-in-out infinite}
@keyframes warnblink{0%,100%{background:var(--warn-bg)}50%{background:rgba(255,170,0,0.28)}}
.btn-icon{font-size:14px;line-height:1}
.btn-lbl{font-size:7px;letter-spacing:0.5px}
.pat-row{display:grid;grid-template-columns:30px 1fr 30px;gap:5px;margin-bottom:3px}
.pat-arrow{height:30px;background:var(--btn-bg);border:2px solid var(--base);border-radius:var(--br);color:var(--base);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s}
.pat-arrow:hover{background:#525252}
.pat-name{height:30px;background:#1c1c1c;border:2px solid #3a3a3a;border-radius:var(--br);color:#888;font-size:8px;letter-spacing:1px;display:flex;align-items:center;justify-content:center;font-family:var(--font);text-transform:uppercase;transition:border-color 0.15s,color 0.15s,background 0.15s}
.pat-name.on{color:var(--active);border-color:var(--active);background:var(--active-bg)}
.pat-ctr{font-size:7px;color:#444;text-align:center;margin-bottom:5px;letter-spacing:0.5px}
.tone-row{display:flex;gap:5px;margin-bottom:5px}
.tone-btn{flex:1;height:26px;background:var(--btn-bg);border:2px solid var(--base);border-radius:var(--br);color:var(--base);font-family:var(--font);font-size:7px;font-weight:bold;letter-spacing:0.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-transform:uppercase;transition:border-color 0.12s,color 0.12s,background 0.12s}
.tone-btn:hover{background:#525252}
.tone-btn.active{border-color:var(--active);color:var(--active);background:var(--active-bg)}
.ftr{display:flex;align-items:center;justify-content:space-between;padding-top:7px;border-top:1px solid #282828}
.ftr-info{font-size:7.5px;color:#555;letter-spacing:0.5px}
.ftr-key{font-size:7.5px;color:#555}
.ftr-key kbd{background:#2a2a2a;border:1px solid #444;padding:1px 3px;border-radius:2px;font-family:var(--font);font-size:7.5px}
.interact .ftr-key{display:none}
</style>
</head>
<body>
<div id="panel">
<div class="hdr">
<div class="hdr-dot" id="hdr-dot"></div>
<div class="hdr-title">GC &nbsp; ELS</div>
<div class="hdr-badge" id="hdr-badge">INAKTIV</div>
<div class="hdr-esc" onclick="closeInteract()">ESC</div>
</div>
<div class="btn-grid">
<button class="btn" id="btn-s0" onclick="setStage(0)"><span class="btn-icon">&#9711;</span><span class="btn-lbl">AUS</span></button>
<button class="btn" id="btn-s1" onclick="setStage(1)"><span class="btn-icon">&#10022;</span><span class="btn-lbl">LICHTER</span></button>
<button class="btn" id="btn-s2" onclick="setStage(2)"><span class="btn-icon">&#8776;</span><span class="btn-lbl">SIRENE</span></button>
<button class="btn" id="btn-warn" onclick="toggleWarning()"><span class="btn-icon">&#9651;</span><span class="btn-lbl">WARNUNG</span></button>
</div>
<div class="pat-row">
<button class="pat-arrow" onclick="prevPattern()">&#9664;</button>
<div class="pat-name" id="pat-name">&#8211;</div>
<button class="pat-arrow" onclick="nextPattern()">&#9654;</button>
</div>
<div class="pat-ctr" id="pat-ctr"></div>
<div class="tone-row" id="tone-row"></div>
<div class="ftr">
<div class="ftr-info" id="ftr-info">Kein ELS-Fahrzeug aktiv</div>
<div class="ftr-key"><kbd>P</kbd>&nbsp;Interagieren</div>
</div>
</div>
<script>
"use strict";
var S={active:false,stage:0,pattern:1,patternName:"-",patternCount:1,tone:1,warning:false,extrasCount:0,vehicleClass:18,tones:[],interacting:false};
var panel=document.getElementById("panel");
var dot=document.getElementById("hdr-dot");
var badge=document.getElementById("hdr-badge");
var patName=document.getElementById("pat-name");
var patCtr=document.getElementById("pat-ctr");
var toneRow=document.getElementById("tone-row");
var ftrInfo=document.getElementById("ftr-info");
function luaCall(ep,data){fetch("https://gc_elsmenu/"+ep,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data||{})});}
function setStage(s){luaCall("nuiSetStage",{stage:s});}
function setTone(t){luaCall("nuiSetTone",{tone:t});}
function nextPattern(){luaCall("nuiNextPattern",{});}
function prevPattern(){luaCall("nuiPrevPattern",{});}
function toggleWarning(){luaCall("nuiToggleWarning",{});}
function closeInteract(){luaCall("nuiClose",{});}
function renderUI(){
var a=S.active,lit=a&&S.stage>0;
dot.className="hdr-dot"+(lit?" on":"");
badge.textContent=a?"KL. "+S.vehicleClass:"INAKTIV";
document.getElementById("btn-s0").className="btn"+(S.stage===0?" off-sel":"");
document.getElementById("btn-s1").className="btn"+(a&&S.stage===1?" active":"");
document.getElementById("btn-s2").className="btn"+(a&&S.stage===2?" active":"");
document.getElementById("btn-warn").className="btn"+(S.warning?" warn-on":"");
patName.textContent=a?S.patternName:"\u2013";
patName.className="pat-name"+(lit?" on":"");
patCtr.textContent=a?(S.pattern+" / "+S.patternCount):"";
toneRow.querySelectorAll(".tone-btn").forEach(function(b,i){b.className="tone-btn"+(S.tone===i+1&&S.stage>=2?" active":"");});
ftrInfo.textContent=a?(S.extrasCount+" Extras \u00b7 KL "+S.vehicleClass):"Kein ELS-Fahrzeug aktiv";
}
function buildTones(){
toneRow.innerHTML="";
S.tones.forEach(function(t,i){
var b=document.createElement("button");
b.className="tone-btn";b.textContent=t.name;b.id="btn-t"+(i+1);
b.onclick=(function(idx){return function(){setTone(idx);};})(i+1);
toneRow.appendChild(b);
});
}
window.addEventListener("message",function(evt){
var d=evt.data;
switch(d.type){
case"show":panel.style.display="block";break;
case"hide":panel.style.display="none";panel.classList.remove("interact");S.interacting=false;break;
case"init":S.tones=d.tones||[];buildTones();break;
case"update":var h=S.tones.length;Object.assign(S,d);if(!h&&S.tones.length)buildTones();renderUI();break;
case"setInteract":S.interacting=!!d.value;panel.classList.toggle("interact",S.interacting);break;
}
});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeInteract();});
</script>
</body>
</html>
